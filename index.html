<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miller's Lechon</title>

    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="shortcut icon" href="assets/favicon/favicon_io/favicon-32x32.png" type="image/x-icon">
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-md mx-auto text-slate-800">
    <main class="p-5 space-y-5">
        <h1 class="text-3xl font-bold text-center sm:text-left">Miller's Lechon Tools</h1>
        <p class="max-w-sm text-center sm:text-left">Hello! This website comprises of <strong>tools</strong> that can be used to boost productivity of their staff.</p>

        <div class="grid grid-cols-2 gap-3">
            <a href="table/index.html" class="block border rounded-md p-3 gap-3 items-start hover:shadow-xl transition-all ease-in-out group">
                <div class="grid place-items-center p-3 border rounded-md aspect-square w-min
                    group-hover:border-transparent group-hover:bg-green-500 group-hover:text-white
                    transition-all ease-in-out">
                    <span class="material-symbols-outlined">table_restaurant</span>
                </div>
                <div class="mt-3">
                    <h2 class="font-bold">Table Manager</h2>
                    <p class="text-sm">To manage the restaurant's table.</p>
                </div>
            </a>

            <a href="menu/index.html" class="block border rounded-md p-3 gap-3 items-start hover:shadow-xl transition-all ease-in-out group">
                <div class="grid place-items-center p-3 border rounded-md aspect-square w-min
                    group-hover:border-transparent group-hover:bg-green-500 group-hover:text-white
                    transition-all ease-in-out">
                    <span class="material-symbols-outlined">menu_book</span>
                </div>
                <div class="mt-3">
                    <h2 class="font-bold">Menu Generator</h2>
                    <p class="text-sm">To generate text menu for Facebook posts.</p>
                </div>
            </a>
        </div>
    </main>   
</body>
</html>
