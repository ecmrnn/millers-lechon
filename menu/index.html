<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miller's Lechon</title>

    <link rel="shortcut icon" href="/assets/favicon/favicon_io/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/assets/css/style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/load.js" defer></script>
    <script src="assets/js/script.js" defer></script>
</head>
<body class="max-w-md mx-auto text-slate-800">
    <a href="/index.html" class="sm:fixed pl-3 pr-5 py-2 top-5 left-5 text-xs font-bold rounded-md flex items-center gap-3 transition-all ease-in-out
        hover:bg-green-500 hover:text-white"><span class="material-symbols-outlined">chevron_backward</span> More Tools</a>
        
    <main class="p-5">
        <h1 class="text-3xl font-bold text-center sm:text-left">Menu Generator</h1>

        <form class="space-y-5 mt-5">
            <div>
                <textarea name="output" id="output" class="px-3 py-2 block w-full border border-slate-200 rounded-md min-h-52" readonly></textarea>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <button id="reset" type="reset" class="bg-white hover:bg-slate-50 px-3 py-2 rounded-md border border-slate-200 font-semibold w-full transition-all ease-in-out">Reset</button>
                    <button id="copy" type="button" class="bg-green-500 hover:bg-green-600 px-3 py-2 rounded-md text-white font-semibold w-full transition-all ease-in-out">Copy Text</button>
                </div>
            </div>

            <p class="font-semibold">Pili ka ng mga pagkain na nasa menu for today. Wala yung ulam dito? Padagdag mo kay ec. 😗</p>

            <input type="search" name="search" id="search" placeholder="Di makitang ulam? 🧐" class="w-full px-3 py-2 border rounded-md" autocomplete="off">

            <div class="grid grid-cols-2 gap-2 text-xs sm:text-sm" id="ulams">
            </div>
        </form>
    </main>
</body>
</html>
