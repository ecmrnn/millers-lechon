<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miller's Lechon</title>

    <link rel="shortcut icon" href="/assets/favicon/favicon_io/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/assets/css/style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/load.js" defer></script>
    <!-- <script src="assets/js/script.js" defer></script> -->
</head>
<body class="max-w-md mx-auto text-slate-800">
    <a href="/index.html" class="sm:fixed pl-3 pr-5 py-2 top-5 left-5 text-xs font-bold rounded-md flex items-center gap-3 transition-all ease-in-out
        hover:bg-green-500 hover:text-white"><span class="material-symbols-outlined">chevron_backward</span> More Tools</a>
        
    <main class="p-5">
        <h1 class="text-3xl font-bold text-center sm:text-left">Table Manager</h1>
        <p>Click ka ng table.</p>

        <section id="tables" class="mt-5 grid grid-cols-2 gap-3">
        </section>
    </main>

    <!-- Modal -->
     <form name="updateTable" id="modal" onsubmit="e.preventDefault()" class="hidden w-screen h-screen bg-black/5 backdrop-blur-md top-0 left-0 grid place-items-center">
         <div class="max-w-md bg-white p-3 rounded-md shadow-lg space-y-3">
            <hgroup>
                <h2 class="font-bold text-lg">Table <span id="tableNumber"></span></h2>
                <p>Enter or update the balance of the selected table.</p>
            </hgroup>

            <input type="number" name="balance" id="balance" placeholder="Balance: " class="border rounded-md px-3 py-2 w-full">

            <div class="grid grid-cols-2 gap-3">
                <button id="close" type="button" class="bg-white hover:bg-slate-50 px-3 py-2 rounded-md border border-slate-200 font-semibold w-full transition-all ease-in-out">Cancel</button>
                <button id="update" type="button" class="bg-green-500 hover:bg-green-600 px-3 py-2 rounded-md text-white font-semibold w-full transition-all ease-in-out">Update Table</button>
            </div>
        </div>
     </form>
</body>
</html>
