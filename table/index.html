<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miller's Lechon</title>

    <link rel="shortcut icon" href="/assets/favicon/favicon_io/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/assets/css/style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/load.js" defer></script>
</head>
<body class="max-w-md mx-auto text-slate-800">
    <a href="/index.html" class="sm:fixed pl-3 pr-5 py-2 top-5 left-5 text-xs font-bold sm:rounded-md flex items-center gap-3 transition-all ease-in-out
        hover:bg-green-500 hover:text-white"><span class="material-symbols-outlined">chevron_backward</span> More Tools</a>
        
    <main class="p-5">
        <hgroup class="text-center sm:text-left">
            <h1 class="text-3xl font-bold">Table Manager</h1>
            <p>Click ka ng table. Kulang ba ng table? Padagdag mo kay ec. 😗</p>
        </hgroup>

        <section id="tables" class="mt-5 grid grid-cols-2 gap-3">
            <!-- List of tables goes here... -->
        </section>

        <button id="reset" type="button" class="mt-3 bg-green-500 hover:bg-green-600 px-3 py-2 rounded-md text-white font-semibold transition-all ease-in-out">Reset Tables</button>
        
        <section id="profit" class="hidden mt-3 border rounded-md p-3">
            <h3 class="text-md font-bold">Dine-in Profits</h3>
            
            <div id="profits" class="my-2 space-y-1 text-sm">
                <!-- Profit goes here... -->
            </div>
            <hr>
            <p class="flex justify-between text-sm text-green-500 font-bold mt-2"><span>Total:</span> <span id="netProfit">1,000.00</span></p>
            
            <button id="resetProfit" type="button" class="mt-3 bg-red-500 hover:bg-red-600 px-3 py-2 rounded-md text-white font-semibold transition-all ease-in-out">Reset Profit</button>
        </section>
    </main>

    <!-- Modal -->
     <form name="updateTable" id="modal" onsubmit="e.preventDefault()" class="p-5 hidden w-screen h-screen bg-black/5 backdrop-blur-md top-0 left-0 pt-20">
         <div class="max-w-md mx-auto bg-white p-3 rounded-md shadow-lg space-y-3 border border-slate-200">
            <hgroup>
                <h2 class="font-bold text-lg">Table <span id="tableNumber"></span></h2>
                <p>Enter or update the balance of the selected table.</p>
            </hgroup>

            <div class="flex gap-1">
                <input type="number" name="balance" id="balance" placeholder="Balance: " class="border rounded-md px-3 py-2 w-full">
                <button id="addToggle" type="button" class="px-5 py-2 rounded-md font-bold bg-green-500 text-white w-1/3">Add</button>
            </div>
            
            <div id="addBtns" class="grid grid-cols-2 gap-1 text-sm font-bold">
                <!-- Add buttons goes here... -->
            </div>
            
            <h3 class="font-bold">What to do?</h3>

            <div class="grid grid-cols-3 gap-1">
                <button id="close" type="button" class="bg-white hover:bg-slate-50 px-3 py-2 rounded-md border border-slate-200 font-semibold w-full transition-all ease-in-out">Cancel</button>
                <button id="update" type="button" class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-2 rounded-md font-semibold w-full transition-all ease-in-out">Update</button>
                <button id="paid" type="button" class="bg-green-500 hover:bg-green-600 px-3 py-2 rounded-md text-white font-semibold w-full transition-all ease-in-out">Paid</button>
            </div>
        </div>
     </form>
</body>
</html>
